            },
            
            /**
             * Busca cotações da API
             */
            async buscarCotacoes() {
                const moedas = CONFIG.MOEDAS.join('-BRL,') + '-BRL';
                const url = `${CONFIG.URL_API_COTACOES}/${moedas}`;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                try {
                    const response = await fetch(url, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`Erro na API: ${response.status}`);
                    }
                    
                    const contentType = response.headers.get('content-type');
                    if (!contentType?.includes('application/json')) {
                        throw new Error('API retornou resposta não-JSON');
                    }
                    
                    return await response.json();
                } catch (error) {
                    clearTimeout(timeoutId);
                    throw error;
                }
            },
            
            /**
             * Formata valor da cotação
             */
            formatarValor(valor, codigo) {
                const num = parseFloat(valor);
                if (Number.isNaN(num)) return '--';
                
                // Bitcoin tem muitas casas decimais
                if (codigo === 'BTC') {
                    return num.toLocaleString('pt-BR', { 
                        style: 'currency', 
                        currency: 'BRL',
                        minimumFractionDigits: 0,
                        maximumFractionDigits: 0
                    });
                }
                
                // Iene tem valor baixo, mostrar mais casas
                if (codigo === 'JPY') {
                    return num.toLocaleString('pt-BR', { 
                        style: 'currency', 
                        currency: 'BRL',
                        minimumFractionDigits: 4,
                        maximumFractionDigits: 4
                    });
                }
                
                return num.toLocaleString('pt-BR', { 
                    style: 'currency', 
                    currency: 'BRL',
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
            },
            
            /**
             * Formata variação percentual
             */
            formatarVariacao(variacao) {
                const num = parseFloat(variacao);
                if (Number.isNaN(num)) return '0.00%';
                const sinal = num > 0 ? '+' : '';
                return `${sinal}${num.toFixed(2)}%`;
            },
            
            /**
             * Determina classe CSS da variação
             */
            obterClasseVariacao(variacao) {
                const num = parseFloat(variacao);
                if (num > 0) return 'positive';
                if (num < 0) return 'negative';
                return 'neutral';
            },
            
            /**
             * Renderiza os itens de cotação
             */
            renderizarCotacoes(dados) {
                const track = document.getElementById('currencyTrack');
                if (!track) return;
                
                if (!dados || typeof dados !== 'object' || Array.isArray(dados)) return;
                
                const itens = CONFIG.MOEDAS.map(codigo => {
                    const chave = `${codigo}BRL`;
                    const cotacao = dados[chave];
                    
                    if (!cotacao || typeof cotacao !== 'object') return '';
                    
                    const bandeira = this.bandeiras[codigo] || '💱';
                    const valor = this.formatarValor(cotacao.bid, codigo);
                    const variacao = this.formatarVariacao(cotacao.pctChange);
                    const classeVariacao = this.obterClasseVariacao(cotacao.pctChange);
                    const tituloSeguro = Utilidades.escaparHtml(`${this.nomesMoedas[codigo] || codigo}: ${valor}`);
                    const valorSeguro = Utilidades.escaparHtml(String(valor));
                    const variacaoSegura = Utilidades.escaparHtml(String(variacao));
                    
                    return `
                        <div class="currency-item" title="${tituloSeguro}">
                            <span class="currency-flag" aria-hidden="true">${bandeira}</span>
                            <span class="currency-code">${codigo}</span>
                            <span class="currency-value">${valorSeguro}</span>
                            <span class="currency-change ${classeVariacao}" aria-label="Variação: ${variacaoSegura}">${variacaoSegura}</span>
                        </div>
                    `;
                }).join('');
                
                // Duplica os itens para criar efeito de loop infinito
                track.innerHTML = itens + itens;
                
                // Ajusta a duração da animação baseado no número de itens
                const numItens = CONFIG.MOEDAS.length;
                const duracao = numItens * 4; // 4 segundos por item
                track.style.setProperty('--ticker-duration', `${duracao}s`);
            },
            
            /**
             * Atualiza interface com os dados
             */
            atualizarInterface(dados) {
                const widget = document.getElementById('currencyTicker');
                if (!widget) return;
                
                const dadosValidos = dados && typeof dados === 'object' && !Array.isArray(dados);
                widget.classList.remove('loading');
                if (dadosValidos) {
                    this.renderizarCotacoes(dados);
                    this.ultimasCotacoes = dados;
                }
            },
            
            /**
             * Mostra estado de erro
             */
            mostrarErro() {
                const widget = document.getElementById('currencyTicker');
                const track = document.getElementById('currencyTrack');
                
                if (widget) widget.classList.remove('loading');
                
                if (track && !this.ultimasCotacoes) {
                    track.innerHTML = `
                        <div class="currency-item">
                            <span class="currency-flag">⚠️</span>
                            <span class="currency-value" style="opacity: 0.6;">Cotações indisponíveis</span>
                        </div>
                    `;
                }
            },
            
            /**
             * Inicializa o widget de cotações
             */
            async iniciar() {
                // Limpa intervalo existente
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                    this.refreshInterval = null;
                }
                
                try {
                    const dados = await this.buscarCotacoes();
                    this.atualizarInterface(dados);
                    
                    // Configura atualização periódica
                    this.refreshInterval = setInterval(() => this.atualizar(), CONFIG.INTERVALO_COTACOES);
                    
                    log('[App] Widget de cotações inicializado');
                } catch (error) {
                    avisar('Erro ao carregar cotações:', error.message);
                    this.mostrarErro();
                    
                    // Tenta novamente após 30 segundos
                    if (this.retryTimeoutId != null) clearTimeout(this.retryTimeoutId);
                    this.retryTimeoutId = setTimeout(() => this.iniciar(), 30000);
                }
            },
            
            /**
             * Limpa recursos
             */
            destruir() {
                if (this.retryTimeoutId != null) {
                    clearTimeout(this.retryTimeoutId);
                    this.retryTimeoutId = null;
                }
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                    this.refreshInterval = null;
                }
            },
            
            /**
             * Atualiza cotações
             */
            async atualizar() {
                try {
                    const dados = await this.buscarCotacoes();
                    this.atualizarInterface(dados);
                } catch (error) {
                    avisar('Erro ao atualizar cotações:', error.message);
                }
            }
        };

        /* Relógio */
        const ControladorRelogio = {
            tickInterval: null,
            diasSemana: ['domingo', 'segunda-feira', 'terça-feira', 'quarta-feira', 'quinta-feira', 'sexta-feira', 'sábado'],
            meses: ['janeiro', 'fevereiro', 'março', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'],

            formatarHora(now) {
                const h = now.getHours();
                const m = now.getMinutes();
                const s = now.getSeconds();
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            },

            formatarDia(now) {
                if (!(now instanceof Date) || isNaN(now.getTime())) return '—';
                const dia = this.diasSemana[now.getDay()];
                const d = now.getDate();
                const mes = this.meses[now.getMonth()];
                return `${dia}, ${d} de ${mes}`;
            },

            atualizar() {
                const timeEl = document.getElementById('clockTime');
                const dateEl = document.getElementById('clockDate');
                if (!timeEl || !dateEl) return;
                const now = new Date();
                timeEl.textContent = this.formatarHora(now);
                dateEl.textContent = this.formatarDia(now);
                timeEl.setAttribute('datetime', now.toISOString());
            },

            iniciar() {
                if (this.tickInterval) {
                    clearInterval(this.tickInterval);
                    this.tickInterval = null;
                }
                this.atualizar();
                this.tickInterval = setInterval(() => this.atualizar(), 1000);
            },

            destruir() {
                if (this.tickInterval) {
                    clearInterval(this.tickInterval);
                    this.tickInterval = null;
                }
            }
        };

        /* Parser RSS */
        const AnalisadorRSS = {
            /**
             * Extrai URL de imagem do conteúdo HTML
             */
            extrairImagemDoHTML(html) {
                if (!html) return null;
                
                // Tenta encontrar tag img com src
                const imgMatch = html.match(/<img[^>]+src=["']([^"']+)["']/i);
                if (imgMatch?.[1]) {
                    const url = imgMatch[1];
                    // Filtra pixels de rastreamento e imagens pequenas
                    if (!url.includes('1x1') && 
                        !url.includes('tracking') && 
                        !url.includes('pixel') &&
                        !url.includes('spacer')) {
                        return url;
                    }
                }
                
                // Tenta encontrar og:image ou outros padrões de imagem
                const srcMatch = html.match(/(?:src|href)=["']([^"']+\.(?:jpg|jpeg|png|webp|gif))/i);
                return srcMatch?.[1] || null;
            },

            /**
             * Analisa documento XML RSS/Atom
             */
            analisarXML(xmlText, feedName) {
                if (xmlText == null || typeof xmlText !== 'string') throw new Error(`Conteúdo inválido para ${feedName}`);
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                // Verifica erros de análise
                const parseError = xmlDoc.querySelector('parsererror');
                if (parseError) {
                    throw new Error(`Erro ao analisar XML para ${feedName}`);
                }

                // Detecta tipo de feed (Atom vs RSS)
                const isAtom = !!xmlDoc.querySelector('feed');
                const channel = isAtom ? xmlDoc.querySelector('feed') : xmlDoc.querySelector('channel');
                
                if (!channel) {
                    throw new Error(`Estrutura de feed inválida para ${feedName}`);
                }

                // Obtém título do feed
                const feedTitle = channel.querySelector('title')?.textContent || feedName;

                // Obtém itens/entradas
                const itemElements = isAtom 
                    ? Array.from(xmlDoc.querySelectorAll('entry'))
                    : Array.from(xmlDoc.querySelectorAll('item'));

                const items = itemElements.map(item => {
                    return isAtom 
                        ? this.analisarEntradaAtom(item, feedName)
                        : this.analisarItemRSS(item, feedName);
                }).filter(item => item.title && item.title !== 'Sem título');

                return { feed: { title: feedTitle }, items };
            },

            /**
             * Analisa entrada Atom
             */
            analisarEntradaAtom(entry, feedName) {
                const content = entry.querySelector('content')?.textContent || '';
                const summary = entry.querySelector('summary')?.textContent || '';
                const thumbnail = this.extrairImagemDoHTML(content) || this.extrairImagemDoHTML(summary);
                const linkEl = entry.querySelector('link[rel="alternate"], link');
                
                return {
                    title: Utilidades.removerHtml(entry.querySelector('title')?.textContent) || 'Sem título',
                    link: linkEl?.getAttribute('href') || '#',
                    description: summary || content,
                    pubDate: entry.querySelector('published')?.textContent || 
                            entry.querySelector('updated')?.textContent || 
                            new Date().toISOString(),
                    thumbnail,
                    source: feedName
                };
            },

            /**
             * Analisa item RSS
             */
            analisarItemRSS(item, feedName) {
                let thumbnail = null;
                
                // Tenta várias fontes de thumbnail
                const mediaThumbnail = item.querySelector('thumbnail');
                if (mediaThumbnail) {
                    thumbnail = mediaThumbnail.getAttribute('url');
                }
                
                if (!thumbnail) {
                    const mediaContent = item.querySelector('content[url]');
                    if (mediaContent) {
                        thumbnail = mediaContent.getAttribute('url');
                    }
                }
                
                if (!thumbnail) {
                    const enclosure = item.querySelector('enclosure');
                    if (enclosure?.getAttribute('type')?.startsWith('image/')) {
                        thumbnail = enclosure.getAttribute('url');
                    }
                }
                
                if (!thumbnail) {
                    const description = item.querySelector('description')?.textContent || '';
                    const encoded = item.querySelector('encoded')?.textContent || '';
                    thumbnail = this.extrairImagemDoHTML(description + encoded);
                }
                
                return {
                    title: Utilidades.removerHtml(item.querySelector('title')?.textContent) || 'Sem título',
                    link: item.querySelector('link')?.textContent || '#',
                    description: item.querySelector('description')?.textContent || '',
                    pubDate: item.querySelector('pubDate')?.textContent || new Date().toISOString(),
                    thumbnail,
                    source: feedName
                };
            }
        };

        /* Busca de feeds */
        const BuscadorFeed = {
            /**
             * Busca um único feed com lógica de tentativas
             */
            async buscarFeed(feedConfig, proxyIndex = 0) {
                if (!feedConfig?.url) throw new Error('Configuração de feed inválida');
                const retryKey = feedConfig.url;
                const currentRetry = EstadoApp.retryCount.get(retryKey) || 0;
                let timeoutId;
                
                try {
                    // Usa proxy primário primeiro (índice 0), depois fallbacks
                    const proxy = proxyIndex === 0 
                        ? CONFIG.URL_PROXY 
                        : CONFIG.PROXIES_RESERVA[proxyIndex - 1];
                    
                    // Se não há mais proxies disponíveis, usa o primário
                    if (!proxy) {
                        throw new Error('Nenhum proxy disponível');
                    }
                    
                    const proxyUrl = `${proxy}${encodeURIComponent(feedConfig.url)}`;
                    
                    const controller = new AbortController();
                    timeoutId = setTimeout(() => controller.abort(), 15000);
                    
                    const response = await fetch(proxyUrl, {
                        signal: controller.signal,
                        headers: {
                            'Accept': 'application/rss+xml, application/xml, text/xml, */*'
                        }
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const xmlText = await response.text();
                    const data = AnalisadorRSS.analisarXML(xmlText, feedConfig.name);
                    
                    // Reseta contador de tentativas em caso de sucesso
                    EstadoApp.retryCount.delete(retryKey);
                    
                    // Armazena resultado em cache
                    EstadoApp.feedCache.set(feedConfig.url, {
                        data,
                        timestamp: Date.now()
                    });
                    
                    return {
                        ...feedConfig,
                        feed: data.feed,
                        items: data.items.slice(0, feedConfig.maxItems || 10)
                    };
                    
                } catch (err) {
                    if (timeoutId != null) clearTimeout(timeoutId);
                    avisar(`Erro ao carregar ${feedConfig.name} (tentativa ${currentRetry + 1}):`, err.message);
                    
                    // Tenta próximo proxy (0 = primário, 1+ = fallbacks)
                    const totalProxies = 1 + CONFIG.PROXIES_RESERVA.length;
                    if (proxyIndex < totalProxies - 1) {
                        return this.buscarFeed(feedConfig, proxyIndex + 1);
                    }
                    
                    // Tenta novamente com atraso
                    if (currentRetry < CONFIG.MAX_TENTATIVAS) {
                        EstadoApp.retryCount.set(retryKey, currentRetry + 1);
                        await Utilidades.esperar(CONFIG.ATRASO_TENTATIVA * (currentRetry + 1));
                        return this.buscarFeed(feedConfig, 0);
                    }
                    
                    // Verifica cache para fallback
                    const cached = EstadoApp.feedCache.get(feedConfig.url);
                    if (cached) {
                        log(`Usando cache para ${feedConfig.name}`);
                        return {
                            ...feedConfig,
                            feed: cached.data.feed,
                            items: cached.data.items.slice(0, feedConfig.maxItems || 10),
                            fromCache: true
                        };
                    }
                    
                    return {
                        ...feedConfig,
                        error: err.message
                    };
                }
            },

            /**
             * Busca todos os feeds concorrentemente
             */
            async buscarTodosFeeds() {
                const feedPromises = FEEDS_RSS.map(feed => this.buscarFeed(feed));
                return Promise.all(feedPromises);
            }
        };

        /* Agregação de notícias */
        const AgregadorNoticias = {
            /**
             * Coleta todas as notícias de todos os feeds e distribui aleatoriamente pelos widgets
             */
            agregarEDistribuir(feedResults) {
                if (!Array.isArray(feedResults)) return this.criarWidgetsDeErro([]);
                // Coleta todos os itens de notícias válidos com informação da fonte
                const allNews = [];
                
                feedResults.forEach(feed => {
                    if (feed.error || !feed.items) return;
                    
                    feed.items.forEach(item => {
                        allNews.push({
                            ...item,
                            sourceFeed: feed.name,
                            sourceUrl: feed.url
                        });
                    });
                });
                
                if (allNews.length === 0) {
                    return this.criarWidgetsDeErro(feedResults);
                }
                
                // Embaralha todas as notícias aleatoriamente
                const shuffledNews = Utilidades.embaralharArray(allNews);
                
                // Distribui pelos widgets
                const widgets = [];
                const itemsPerWidget = CONFIG.ITENS_POR_WIDGET;
                const widgetCount = Math.min(CONFIG.QTD_WIDGETS, Math.ceil(shuffledNews.length / itemsPerWidget));
                
                for (let i = 0; i < widgetCount; i++) {
                    const startIdx = i * itemsPerWidget;
                    const endIdx = Math.min(startIdx + itemsPerWidget, shuffledNews.length);
                    const widgetItems = shuffledNews.slice(startIdx, endIdx);
                    
                    // Se acabarem as notícias, faz loop
                    if (widgetItems.length < itemsPerWidget && shuffledNews.length > 0) {
                        const remaining = itemsPerWidget - widgetItems.length;
                        const extraItems = Utilidades.embaralharArray(shuffledNews).slice(0, remaining);
                        widgetItems.push(...extraItems);
                    }
                    
                    widgets.push({
                        name: `Widget ${i + 1}`,
                        items: widgetItems,
                        isMixed: true
                    });
                }
                
                return widgets;
            },

            /**
             * Cria widgets de erro quando todos os feeds falham
             */
            criarWidgetsDeErro(feedResults) {
                const errorFeeds = feedResults.filter(f => f.error);
                return [{
                    name: 'Erro',
                    error: `Falha ao carregar ${errorFeeds.length} feed(s)`,
                    items: []
                }];
            }
        };

        /* Carrossel */
        const ControladorCarrossel = {
            /**
             * Inicializa carrossel para um widget
             */
            iniciarCarrossel(widgetElement, itemCount) {
                if (!widgetElement || itemCount <= 1) return;
                
                const carouselItems = widgetElement.querySelectorAll('.carousel-item');
                const indicators = widgetElement.querySelectorAll('.indicator');
                let currentIndex = 0;
                let isPaused = false;

                const atualizarCarrossel = (newIndex) => {
                    // Atualiza item antigo
                    const oldItem = carouselItems[currentIndex];
                    if (oldItem) {
                        oldItem.classList.remove('active');
                        oldItem.setAttribute('aria-hidden', 'true');
                        // Torna links não-focáveis
                        const oldLink = oldItem.querySelector('a');
                        if (oldLink) oldLink.setAttribute('tabindex', '-1');
                    }
                    indicators[currentIndex]?.classList.remove('active');
                    indicators[currentIndex]?.setAttribute('aria-selected', 'false');
                    indicators[currentIndex]?.setAttribute('tabindex', '-1');
                    
                    currentIndex = newIndex;
                    
                    // Atualiza novo item
                    const newItem = carouselItems[currentIndex];
                    if (newItem) {
                        newItem.classList.add('active');
                        newItem.setAttribute('aria-hidden', 'false');
                        // Torna links focáveis
                        const newLink = newItem.querySelector('a');
                        if (newLink) newLink.setAttribute('tabindex', '0');
                    }
                    indicators[currentIndex]?.classList.add('active');
                    indicators[currentIndex]?.setAttribute('aria-selected', 'true');
                    indicators[currentIndex]?.setAttribute('tabindex', '0');
                    
                    // Reinicia a animação de progresso forçando um reflow
                    const activeIndicator = indicators[currentIndex];
                    if (activeIndicator) {
                        activeIndicator.style.animation = 'none';
                        activeIndicator.offsetHeight; // Força reflow
                        activeIndicator.style.animation = '';
                    }
                };

                const proximoSlide = () => {
                    if (!isPaused) {
                        atualizarCarrossel((currentIndex + 1) % itemCount);
                    }
                };
                
                const slideAnterior = () => {
                    atualizarCarrossel((currentIndex - 1 + itemCount) % itemCount);
                };

                // Reseta timer após navegação manual
                const resetarTimer = () => {
                    const estado = EstadoApp.carouselTimers.get(widgetElement);
                    if (estado) {
                        clearInterval(estado.timer);
                        const newTimer = setInterval(proximoSlide, CONFIG.INTERVALO_CARROSSEL);
                        EstadoApp.carouselTimers.set(widgetElement, { 
                            ...estado, 
                            timer: newTimer 
                        });
                    }
                };

                // Handler de clique nos indicadores
                const handleIndicatorClick = (index) => () => {
                    atualizarCarrossel(index);
                    resetarTimer();
                };

                // Handler de navegação por teclado
                const handleKeyDown = (event) => {
                    switch (event.key) {
                        case 'ArrowLeft':
                        case 'ArrowUp':
                            event.preventDefault();
                            slideAnterior();
                            resetarTimer();
                            break;
                        case 'ArrowRight':
                        case 'ArrowDown':
                            event.preventDefault();
                            atualizarCarrossel((currentIndex + 1) % itemCount);
                            resetarTimer();
                            break;
                        case 'Home':
                            event.preventDefault();
                            atualizarCarrossel(0);
                            resetarTimer();
                            break;
                        case 'End':
                            event.preventDefault();
                            atualizarCarrossel(itemCount - 1);
                            resetarTimer();
                            break;
                    }
                };

                // Handler de hover
                const handleMouseEnter = () => { isPaused = true; };
                const handleMouseLeave = () => { isPaused = false; };

                // Armazena handlers para remoção posterior
                const indicatorHandlers = [];

                // Adiciona handlers de clique nos indicadores
                indicators.forEach((indicator, index) => {
                    const handler = handleIndicatorClick(index);
                    indicatorHandlers.push({ element: indicator, handler });
                    indicator.addEventListener('click', handler);
                });

                // Adiciona navegação por teclado no container de indicadores
                const indicatorsContainer = widgetElement.querySelector('.carousel-indicators');
                if (indicatorsContainer) {
                    indicatorsContainer.addEventListener('keydown', handleKeyDown);
                }

                // Pausa no hover
                widgetElement.addEventListener('mouseenter', handleMouseEnter);
                widgetElement.addEventListener('mouseleave', handleMouseLeave);

                // Inicia rotação automática
                const timer = setInterval(proximoSlide, CONFIG.INTERVALO_CARROSSEL);
                
                // Armazena estado e handlers para limpeza
                EstadoApp.carouselTimers.set(widgetElement, { 
                    timer, 
                    isPaused: false,
                    handlers: {
                        indicatorHandlers,
                        keydownHandler: handleKeyDown,
                        mouseEnterHandler: handleMouseEnter,
                        mouseLeaveHandler: handleMouseLeave,
                        indicatorsContainer
                    }
                });
            },

            /**
             * Limpa todos os timers e event listeners do carrossel
             */
            limparTodosTimers() {
                EstadoApp.carouselTimers.forEach((estado, widgetElement) => {
                    // Limpa timer
                    clearInterval(estado.timer);
                    
                    // Remove event listeners se existirem
                    if (estado.handlers) {
                        // Remove handlers dos indicadores
                        estado.handlers.indicatorHandlers?.forEach(({ element, handler }) => {
                            element.removeEventListener('click', handler);
                        });
                        
                        // Remove handler de teclado
                        if (estado.handlers.indicatorsContainer && estado.handlers.keydownHandler) {
                            estado.handlers.indicatorsContainer.removeEventListener('keydown', estado.handlers.keydownHandler);
                        }
                        
                        // Remove handlers de hover
                        if (estado.handlers.mouseEnterHandler) {
                            widgetElement.removeEventListener('mouseenter', estado.handlers.mouseEnterHandler);
                        }
                        if (estado.handlers.mouseLeaveHandler) {
                            widgetElement.removeEventListener('mouseleave', estado.handlers.mouseLeaveHandler);
                        }
                    }
                });
                EstadoApp.carouselTimers.clear();
            }
        };

        /* Renderização */
        const Renderizador = {
            /**
             * Cores de gradiente de fallback para cartões sem imagens
             */
            fallbackGradients: [
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
                'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
                'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
                'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
                'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
                'linear-gradient(135deg, #30cfd0 0%, #330867 100%)'
            ],

            /**
             * Obtém gradiente de fallback consistente baseado no título do item
             */
            obterGradienteFallback(title) {
                const str = title != null ? String(title) : '';
                const hash = str.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                return this.fallbackGradients[hash % this.fallbackGradients.length];
            },

            /**
             * Renderiza um único cartão de notícia
             */
            renderizarCartaoNoticia(item, index) {
                if (!item || typeof item !== 'object') {
                    return `<div class="carousel-item ${index === 0 ? 'active' : ''}" role="tabpanel" aria-hidden="${index !== 0}">
                        <article class="feed-item" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <div class="item-content"><h3 class="item-title"><a href="#" tabindex="-1">Sem título</a></h3><div class="item-meta"><span class="item-source">—</span></div></div>
                        </article>
                    </div>`;
                }
                const fallbackGradient = this.obterGradienteFallback(item.title);
                const thumbnailSegura = Utilidades.sanitizarUrlImagem(item.thumbnail);
                const backgroundStyle = thumbnailSegura
                    ? `background-image: url('${Utilidades.escaparHtml(thumbnailSegura)}');`
                    : `background: ${fallbackGradient};`;
                
                // Atributo data para fallback em erro de imagem
                const dataFallback = thumbnailSegura ? `data-fallback="${fallbackGradient}"` : '';
                
                const safeTitle = Utilidades.escaparHtml(item.title ?? 'Sem título');
                const linkSeguro = Utilidades.sanitizarLink(item.link);
                const safeLink = Utilidades.escaparHtml(linkSeguro);
                const sourceDisplay = item.sourceFeed || (item.link ? Utilidades.extrairDominio(item.link) : '');
                const timeAgo = Utilidades.formatarDataRelativa(item.pubDate ?? '');
                
                // Itens inativos do carrossel devem ter tabindex=-1 em elementos interativos
                const linkTabIndex = index === 0 ? '0' : '-1';
                
                return `
                    <div class="carousel-item ${index === 0 ? 'active' : ''}" role="tabpanel" aria-hidden="${index !== 0}">
                        <article class="feed-item" style="${backgroundStyle}" ${dataFallback}>
                            <div class="vidro-distorcao" aria-hidden="true"></div>
                            <div class="vidro-painel" aria-hidden="true"></div>
                            <div class="vidro-especular" aria-hidden="true"></div>
                            <div class="vidro-destaque" aria-hidden="true"></div>
                            <div class="vidro-reflexo" aria-hidden="true"></div>
                            <div class="vidro-sombra" aria-hidden="true"></div>
                            <div class="item-content">
                                <h3 class="item-title">
                                    <a href="${safeLink}" target="_blank" rel="noopener noreferrer" tabindex="${linkTabIndex}">${safeTitle}</a>
                                </h3>
                                <div class="item-meta">
                                    <span class="item-source">${Utilidades.escaparHtml(sourceDisplay)}</span>
                                    ${timeAgo ? `<span class="item-separator" aria-hidden="true">•</span><time datetime="${Utilidades.escaparHtml(item.pubDate ?? '')}"><img class="item-time-icon" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Travel%20and%20places/Timer%20Clock.png" alt="" width="18" height="18" loading="lazy" aria-hidden="true"> ${Utilidades.escaparHtml(timeAgo)}</time>` : ''}
                                </div>
                            </div>
                        </article>
                    </div>
                `;
            },

            /**
             * Renderiza indicadores do carrossel
             */
            renderizarIndicadores(itemCount) {
                const len = Math.max(0, Math.floor(Number(itemCount)));
                if (len <= 1) return '';
                
                const indicators = Array.from({ length: len }, (_, i) => 
                    `<button class="indicator ${i === 0 ? 'active' : ''}" 
                            role="tab" 
                            aria-selected="${i === 0}" 
                            aria-label="Notícia ${i + 1} de ${len}"
                            tabindex="${i === 0 ? '0' : '-1'}"></button>`
                ).join('');
                
                return `<div class="carousel-indicators" role="tablist">${indicators}</div>`;
            },

            /**
             * Renderiza um widget
             */
            renderizarWidget(widgetData, index) {
                if (widgetData.error) {
                    return `
                        <div class="feed-widget error-widget" role="region" aria-label="Erro">
                            <div class="carousel-container">
                                <div class="carousel-item active">
                                    <article class="feed-item">
                                        <div class="vidro-distorcao" aria-hidden="true"></div>
                                        <div class="vidro-painel" aria-hidden="true"></div>
                                        <div class="vidro-especular" aria-hidden="true"></div>
                                        <div class="vidro-destaque" aria-hidden="true"></div>
                                        <div class="vidro-reflexo" aria-hidden="true"></div>
                                        <div class="vidro-sombra" aria-hidden="true"></div>
                                        <div class="item-content">
                                            <div class="error-icon" aria-hidden="true">⚠️</div>
                                            <h3 class="item-title">Erro ao carregar notícias</h3>
                                            <div class="item-meta">
                                                <span class="item-source">Tente novamente em alguns minutos</span>
                                            </div>
                                        </div>
                                    </article>
                                </div>
                            </div>
                        </div>
                    `;
                }

                const items = widgetData.items ?? [];
                const carouselItems = items.map((item, i) => this.renderizarCartaoNoticia(item, i)).join('');
                const indicators = this.renderizarIndicadores(items.length);

                return `
                    <div class="feed-widget" role="region" aria-label="Widget de notícias ${index + 1}">
                        <div class="carousel-container">
                            ${carouselItems}
                        </div>
                        ${indicators}
                    </div>
                `;
            },

            /**
             * Renderiza todos os widgets
             */
            renderizarTodosWidgets(widgets) {
                const container = document.getElementById('feedsContainer');
                if (!container) return;
                container.innerHTML = widgets.map((w, i) => this.renderizarWidget(w, i)).join('');
                
                // Inicializa carrosséis
                const widgetElements = container.querySelectorAll('.feed-widget');
                widgets.forEach((widgetData, index) => {
                    const el = widgetElements[index];
                    if (el && !widgetData.error && widgetData.items?.length > 1) {
                        ControladorCarrossel.iniciarCarrossel(el, widgetData.items.length);
                    }
                });
                
                // Trata imagens quebradas com gradientes de fallback
                this.configurarTratadoresErroImagem(container);
            },
            
            /**
             * Configura handlers de erro para imagens de fundo
             */
            configurarTratadoresErroImagem(container) {
                if (!container) return;
                const feedItems = container.querySelectorAll('.feed-item[data-fallback]');
                
                feedItems.forEach(item => {
                    // Cria imagem de teste para verificar se o fundo carrega
                    const style = item.getAttribute('style') || '';
                    const urlMatch = style.match(/url\(['"]?([^'")\s]+)['"]?\)/);
                    
                    if (urlMatch?.[1]) {
                        const testImg = new Image();
                        testImg.onerror = () => {
                            // Aplica gradiente de fallback
                            const fallback = item.getAttribute('data-fallback');
                            if (fallback) {
                                item.style.backgroundImage = 'none';
                                item.style.background = fallback;
                            }
                        };
                        testImg.src = urlMatch[1];
                    }
                });
            },

            /**
             * Atualiza timestamp da última atualização
             */
            atualizarTimestamp() {
                const now = new Date();
                const timeElement = document.getElementById('lastUpdate');
                
                if (timeElement) {
                    timeElement.textContent = now.toLocaleTimeString('pt-BR', {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    // Define datetime ISO para acessibilidade e SEO
                    timeElement.setAttribute('datetime', now.toISOString());
                }
            },

            /**
             * Mostra estado de carregamento
             */
            mostrarCarregamento() {
                const container = document.getElementById('feedsContainer');
                if (!container) return;
                container.innerHTML = `
                    <div class="loading" role="status" aria-live="polite">
                        <div class="loading-content">
                            <span class="loading-spinner" aria-hidden="true"></span>
                            Carregando...
                        </div>
                    </div>
                `;
            }
        };

        /* Controlador de cursor (oculta ele após inatividade) */

        const ControladorCursor = {
            hideTimeout: null,
            lastMoveTime: 0,
            HIDE_DELAY: 3000,
            THROTTLE_MS: 100,
            
            _handleMouseMove: null,
            _handleMouseDown: null,
            _handleTouchStart: null,

            iniciar() {
                // Habilita apenas em modo fullscreen
                if (!window.matchMedia('(display-mode: fullscreen), (display-mode: standalone)').matches) {
                    return;
                }

                // Cria handlers com referências para remoção posterior
                this._handleMouseMove = () => {
                    const now = Date.now();
                    if (now - this.lastMoveTime >= this.THROTTLE_MS) {
                        this.lastMoveTime = now;
                        this.mostrarCursor();
                    }
                };
                this._handleMouseDown = () => this.mostrarCursor();
                this._handleTouchStart = () => this.ocultarCursor();

                // Adiciona event listeners
                document.addEventListener('mousemove', this._handleMouseMove);
                document.addEventListener('mousedown', this._handleMouseDown);
                document.addEventListener('touchstart', this._handleTouchStart, { passive: true });
                
                // Ocultação inicial
                this.agendarOcultacao();
            },

            mostrarCursor() {
                document.documentElement.classList.remove('cursor-hidden');
                this.agendarOcultacao();
            },

            ocultarCursor() {
                document.documentElement.classList.add('cursor-hidden');
            },

            agendarOcultacao() {
                clearTimeout(this.hideTimeout);
                this.hideTimeout = setTimeout(() => this.ocultarCursor(), this.HIDE_DELAY);
            },
            
            /**
             * Limpa recursos e remove event listeners
             */
            destruir() {
                clearTimeout(this.hideTimeout);
                this.hideTimeout = null;
                
                // Remove event listeners
                if (this._handleMouseMove) {
                    document.removeEventListener('mousemove', this._handleMouseMove);
                    this._handleMouseMove = null;
                }
                if (this._handleMouseDown) {
                    document.removeEventListener('mousedown', this._handleMouseDown);
                    this._handleMouseDown = null;
                }
                if (this._handleTouchStart) {
                    document.removeEventListener('touchstart', this._handleTouchStart);
                    this._handleTouchStart = null;
                }
                
                document.documentElement.classList.remove('cursor-hidden');
            }
        };

        /* Aplicação */
        const App = {
            // Estado interno
            refreshInterval: null,
            
            /**
             * Inicializa a aplicação
             */
            async iniciar() {
                // Inicializa widgets auxiliares (não-bloqueantes)
                ControladorRelogio.iniciar();
                ControladorClima.iniciar();
                ControladorCotacoes.iniciar();

                // Adiciona handler de mudança de visibilidade
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible') {
                        this.verificarEAtualizar();
                    }
                });

                // Adiciona limpeza no beforeunload
                window.addEventListener('beforeunload', () => {
                    this.limpar();
                });

                // Carregamento inicial
                await this.carregarFeeds();
                
                // Agenda atualização periódica (armazena referência)
                this.refreshInterval = setInterval(() => this.carregarFeeds(), CONFIG.INTERVALO_ATUALIZACAO);
            },
            
            /**
             * Limpa todos os recursos
             */
            limpar() {
                if (this.refreshInterval) {
                    clearInterval(this.refreshInterval);
                    this.refreshInterval = null;
                }
                ControladorCarrossel.limparTodosTimers();
                ControladorRelogio.destruir();
                ControladorClima.destruir();
                ControladorCotacoes.destruir();
                ControladorCursor.destruir();
            },

            /**
             * Verifica se atualização é necessária e dispara se for
             */
            verificarEAtualizar() {
                if (EstadoApp.lastFetchTime) {
                    const elapsed = Date.now() - EstadoApp.lastFetchTime;
                    if (elapsed >= CONFIG.INTERVALO_ATUALIZACAO) {
                        this.carregarFeeds();
                    }
                }
            },

            /**
             * Carrega todos os feeds e renderiza
             */
            async carregarFeeds() {
                if (EstadoApp.isLoading) return;
                
                EstadoApp.isLoading = true;
                
                try {
                    // Limpa carrosséis existentes
                    ControladorCarrossel.limparTodosTimers();
                    
                    // Mostra estado de carregamento (apenas no primeiro carregamento)
                    if (!EstadoApp.lastFetchTime) {
                        Renderizador.mostrarCarregamento();
                    }
                    
                    // Busca todos os feeds
                    const feedResults = await BuscadorFeed.buscarTodosFeeds();
                    
                    // Agrega e distribui notícias aleatoriamente
                    const widgets = AgregadorNoticias.agregarEDistribuir(feedResults);
                    
                    // Renderiza widgets
                    Renderizador.renderizarTodosWidgets(widgets);
                    
                    // Atualiza timestamp
                    Renderizador.atualizarTimestamp();
                    EstadoApp.lastFetchTime = Date.now();
                    
                } catch (error) {
                    registrarErro('Erro fatal ao carregar feeds:', error);
                    
                    // Mostra estado de erro
                    const container = document.getElementById('feedsContainer');
                    if (container) {
                        container.innerHTML = `
                        <div class="loading error-widget">
                            <div class="loading-content">
                                Erro ao carregar notícias. Tentando novamente...
                            </div>
                        </div>
                    `;
                    }
                    
                    // Tenta novamente após atraso
                    setTimeout(() => this.carregarFeeds(), CONFIG.ATRASO_TENTATIVA * 2);
                    
                } finally {
                    EstadoApp.isLoading = false;
                }
            }
        };

        /* Service Worker */
        const GerenciadorServiceWorker = {
            /**
             * Registra o service worker (apenas se sw.js existir no servidor, evita 404 no deploy)
             */
            async registrar() {
                if (!('serviceWorker' in navigator)) {
                    log('[App] Service Workers não suportados');
                    return null;
                }

                try {
                    // Verifica se sw.js existe antes de registrar (evita 404 quando não deployado junto)
                    const check = await fetch('./sw.js', { method: 'HEAD' });
                    if (!check.ok) {
                        log('[App] sw.js não encontrado - registro de Service Worker omitido');
                        return null;
                    }

                    const registration = await navigator.serviceWorker.register('./sw.js', {
                        scope: './'
                    });
                    
                    log('[App] Service Worker registrado:', registration.scope);
                    
                    // Escuta atualizações
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        log('[App] Nova versão do Service Worker encontrada');
                        if (newWorker) {
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    log('[App] Nova versão disponível - atualize a página');
                                }
                            });
                        }
                    });
                    
                    // Escuta mensagens do SW
                    navigator.serviceWorker.addEventListener('message', (event) => {
                        const data = event.data;
                        if (data && (data.type === 'SYNC_FEEDS' || data.type === 'REFRESH_FEEDS')) {
                            log('[App] Recebido comando de sync do SW');
                            App.carregarFeeds();
                        }
                    });
                    
                    // Registra para sync periódico em background se suportado
                    if ('periodicSync' in registration) {
                        try {
                            await registration.periodicSync.register('refresh-feeds', {
                                minInterval: 10 * 60 * 1000 // 10 minutos
                            });
                            log('[App] Periodic Background Sync registrado');
                        } catch (error) {
                            log('[App] Periodic Background Sync não disponível:', error.message);
                        }
                    }
                    
                    return registration;
                    
                } catch (error) {
                    registrarErro('[App] Erro ao registrar Service Worker:', error);
                    return null;
                }
            },

            /**
             * Solicita sync em background
             */
            async solicitarSincronizacao() {
                // Verifica se Background Sync é suportado
                if (!('serviceWorker' in navigator) || !('SyncManager' in window)) {
                    return false;
                }

                try {
                    const registration = await navigator.serviceWorker.ready;
                    if (!registration.sync) {
                        return false;
                    }
                    await registration.sync.register('sync-feeds');
                    log('[App] Background sync solicitado');
                    return true;
                } catch (error) {
                    log('[App] Background sync não disponível:', error.message);
                    return false;
                }
            },

            /**
             * Verifica se o app está rodando em modo fullscreen
             */
            estaAutonomo() {
                return window.matchMedia('(display-mode: standalone)').matches ||
                       window.matchMedia('(display-mode: fullscreen)').matches ||
                       window.navigator.standalone === true;
            }
        };

        /* Inicialização */
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                App.iniciar().catch((err) => registrarErro('[App] Erro na inicialização:', err));
                GerenciadorServiceWorker.registrar();
                ControladorCursor.iniciar();
            });
        } else {
            App.iniciar().catch((err) => registrarErro('[App] Erro na inicialização:', err));
            GerenciadorServiceWorker.registrar();
            ControladorCursor.iniciar();
        }

        // Trata eventos online/offline
        window.addEventListener('online', () => {
            log('[App] Conexão restaurada - atualizando feeds');
            App.carregarFeeds();
            GerenciadorServiceWorker.solicitarSincronizacao();
        });

        window.addEventListener('offline', () => {
            log('[App] Offline - usando cache');
        });
    </script>
</body>
</html>
